<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(59,138,219,0.08)" stroke-width="1"/>
    </pattern>
    <radialGradient id="blueGlow" cx="80%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#2F77C4" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#2F77C4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="12%" cy="88%" r="42%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2F77C4"/>
      <stop offset="50%" stop-color="#5BA8F5"/>
      <stop offset="100%" stop-color="#2F77C4"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomFade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#071c36" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040d1a" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1280" height="720" fill="#071c36"/>

  <!-- Grid overlay -->
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- Radial glows -->
  <rect width="1280" height="720" fill="url(#blueGlow)"/>
  <rect width="1280" height="720" fill="url(#goldGlow)"/>

  <!-- Bottom fade -->
  <rect x="0" y="540" width="1280" height="180" fill="url(#bottomFade)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#barGrad)"/>

  <!-- SilverShore badge top-left -->
  <rect x="48" y="44" width="220" height="34" rx="17" fill="rgba(255,255,255,0.07)" stroke="rgba(91,168,245,0.35)" stroke-width="1.5"/>
  <circle cx="72" cy="61" r="4" fill="#3B8ADB" opacity="0.9"/>
  <text x="148" y="66" font-family="-apple-system, 'Inter', Helvetica, sans-serif" font-size="11" font-weight="600" fill="rgba(91,168,245,0.9)" text-anchor="middle" letter-spacing="2.2">SILVERSHORE PARTNERS</text>

  <!-- Central headline -->
  <text x="640" y="272" font-family="-apple-system, 'Inter', Helvetica, sans-serif" font-size="76" font-weight="600" fill="white" text-anchor="middle" opacity="0.96">The Infrastructure Gap</text>

  <!-- Gold divider -->
  <rect x="515" y="306" width="250" height="2" rx="1" fill="url(#goldLine)"/>

  <!-- Subtitle -->
  <text x="640" y="358" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="rgba(255,255,255,0.58)" text-anchor="middle">Why most owner-led businesses leave growth on the table</text>

  <!-- Play button outer glow ring -->
  <circle cx="640" cy="490" r="62" fill="rgba(59,138,219,0.10)" stroke="rgba(59,138,219,0.20)" stroke-width="1"/>
  <!-- Play button ring -->
  <circle cx="640" cy="490" r="50" fill="rgba(59,138,219,0.18)" stroke="rgba(91,168,245,0.50)" stroke-width="1.5"/>
  <!-- Play button fill -->
  <circle cx="640" cy="490" r="36" fill="rgba(59,138,219,0.50)"/>
  <!-- Play triangle -->
  <polygon points="629,472 672,490 629,508" fill="white" opacity="0.94"/>

  <!-- Bottom label -->
  <text x="640" y="640" font-family="-apple-system, 'Inter', Helvetica, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.28)" text-anchor="middle" letter-spacing="3.5">WATCH · SILVERSHORE PARTNERS</text>
</svg>
